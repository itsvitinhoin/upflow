kind = "web"
previewPath = "/"
title = "Up Flow"
version = "1.0.0"
id = "artifacts/up-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22859

[services.development]
run = "pnpm --filter @workspace/up-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/up-flow", "run", "build" ]
run = "pnpm --filter @workspace/up-flow run start"

[services.env]
PORT = "22859"
BASE_PATH = "/"
