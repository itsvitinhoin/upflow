name: Controlled Production Release

on:
  workflow_dispatch:
    inputs:
      staging_verified:
        description: Type STAGING-VERIFIED after the staging migration rehearsal and smoke test pass.
        required: true
        type: string
      release_confirmation:
        description: Type RELEASE to apply the production migration and deploy the current main commit.
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: upflow-production-release
  cancel-in-progress: false

jobs:
  verify-release:
    name: Verify main release gates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require main and explicit release confirmations
        env:
          STAGING_VERIFIED: ${{ inputs.staging_verified }}
          RELEASE_CONFIRMATION: ${{ inputs.release_confirmation }}
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Production releases must be dispatched from main."
            exit 1
          fi

          if [ "${STAGING_VERIFIED}" != "STAGING-VERIFIED" ]; then
            echo "::error::Complete the staging migration rehearsal and smoke test before releasing."
            exit 1
          fi

          if [ "${RELEASE_CONFIRMATION}" != "RELEASE" ]; then
            echo "::error::Type RELEASE to confirm this production release."
            exit 1
          fi

      - name: Require a passing Test workflow for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
              event: "push",
              per_page: 100,
            });

            const passingRun = data.workflow_runs.find(
              (run) => run.name === "Test" && run.conclusion === "success",
            );

            if (!passingRun) {
              core.setFailed(
                `No successful Test workflow exists for ${context.sha}. Wait for main CI to pass before releasing.`,
              );
              return;
            }

            core.info(`Using Test workflow run ${passingRun.html_url}.`);

  migrate-production:
    name: Migrate production database
    needs: verify-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DATABASE_URL: ${{ secrets.UPFLOW_PRODUCTION_DIRECT_URL }}
      DIRECT_URL: ${{ secrets.UPFLOW_PRODUCTION_DIRECT_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Require the direct production database URL
        run: |
          if [ -z "${DIRECT_URL}" ]; then
            echo "::error::Set the UPFLOW_PRODUCTION_DIRECT_URL secret in the GitHub production environment."
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @workspace/up-flow run db:generate

      - name: Verify migration state before release
        run: pnpm --filter @workspace/up-flow run db:migrate:status

      - name: Apply reviewed Prisma migrations
        run: pnpm --filter @workspace/up-flow run db:migrate:deploy

      - name: Verify migration state after release
        run: pnpm --filter @workspace/up-flow run db:migrate:status

  deploy-production:
    name: Deploy and probe production
    needs: migrate-production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      VERCEL_ORG_ID: team_t671r3SZj4i6JvObobazq9UH
      VERCEL_PROJECT_ID: prj_5u1i9AP68L2OIKDQhCX0zzG4uCQq
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Require Vercel release credentials
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::error::Set the VERCEL_TOKEN secret in the GitHub production environment."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy the reviewed main commit
        working-directory: artifacts/up-flow
        run: >-
          npx --yes vercel@56.2.1 deploy --prod --yes
          --token "${VERCEL_TOKEN}"

      - name: Probe the deployed health endpoint
        working-directory: artifacts/up-flow
        run: >-
          npx --yes vercel@56.2.1 curl /api/health
          --yes --fail --silent --show-error
